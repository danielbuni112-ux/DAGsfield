<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    
    <!-- Primary Meta Tags -->
    <title>Open Higgsfield AI — Free Open-Source Alternative to Higgsfield AI</title>
    <meta name="title" content="Open Higgsfield AI — Free Open-Source Alternative to Higgsfield AI" />
    <meta name="description" content="Open Higgsfield AI — the free, open-source alternative to Higgsfield AI. Generate AI images and cinematic shots with 20+ models including Flux, SDXL, Ideogram, and Midjourney." />
    <meta name="keywords" content="higgsfield ai, higgsfield alternative, open source higgsfield, ai image generator, ai cinema studio, flux ai, ai video generation, free higgsfield, open source ai image generation" />
    
    <!-- Theme and PWA -->
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="dark" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/webp" href="/favicon.webp" />
    <link rel="apple-touch-icon" href="/favicon.webp" />
    
    <!-- Security Headers (set via server HTTP headers) -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
    
    <!-- Performance Hints -->
    <link rel="preconnect" href="https://api.muapi.ai" />
    <link rel="dns-prefetch" href="https://api.muapi.ai" />
    
    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Open Higgsfield AI" />
    <meta property="og:description" content="Free, open-source AI image and video generation studio with 20+ models." />
    <meta property="og:image" content="/thumbnails/heroes/image.webp" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="Open Higgsfield AI" />
    <meta property="twitter:description" content="Free, open-source AI image and video generation studio with 20+ models." />
    <meta property="twitter:image" content="/thumbnails/heroes/image.webp" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
